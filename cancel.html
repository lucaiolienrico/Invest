<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="La procedura di pagamento è stata annullata. Nessun addebito è stato effettuato.">
    <meta name="robots" content="noindex, nofollow">
    <title>Pagamento Annullato | InvestPro</title>

    <!--
    =========================================================================
    NOTE DI PRODUZIONE — SICUREZZA CDN
    =========================================================================
    Prima del deploy, aggiungere gli attributi integrity e crossorigin a ogni
    risorsa CDN. Gli hash SHA-384 sono disponibili su:
      - Font Awesome: https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/
      - Google Fonts: non fornisce SRI; considerare self-hosting per produzione.
    =========================================================================
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- crossorigin="anonymous" obbligatorio per l'applicazione CORS policy sul CDN -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous">

    <style>
        /* ====================================================================
           DESIGN TOKENS — allineati al sistema di index.html
           ==================================================================== */
        :root {
            --bg-body:       #0f172a;
            --bg-card:       #1e293b;
            --warning:       #f59e0b;
            --warning-hover: #d97706;
            --text-main:     #f8fafc;
            --text-muted:    #94a3b8;
            --text-inverse:  #0f172a;
            --border:        #334155;
            --radius-xl:     16px;
            --radius-md:     8px;
            --shadow-xl:     0 20px 25px -5px rgba(0, 0, 0, 0.6);
            --transition-base: 250ms ease;
        }

        /* ====================================================================
           RESET & BASE
           ==================================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
            padding: 1.5rem;
        }

        /* ====================================================================
           CARD
           ==================================================================== */
        .cancel-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 3rem 2rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-xl);
            animation: fadeIn 0.4s ease-out both;
        }

        /* ====================================================================
           ICON
           ==================================================================== */
        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-container i {
            font-size: 2.5rem;
            color: var(--warning);
        }

        /* ====================================================================
           TYPOGRAPHY
           ==================================================================== */
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ====================================================================
           BUTTON
           ==================================================================== */
        .btn-warning {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--warning);
            /* FIX: --text-inverse invece di #000 hardcoded per coerenza con il tema */
            color: var(--text-inverse);
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: background var(--transition-base), transform var(--transition-base), box-shadow var(--transition-base);
        }

        .btn-warning:hover {
            background: var(--warning-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.35);
        }

        .btn-warning:focus-visible {
            outline: 2px solid var(--warning);
            outline-offset: 3px;
        }

        /* ====================================================================
           ANIMATIONS
           ==================================================================== */
        @keyframes fadeIn {
            from { transform: scale(0.95); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }
    </style>
</head>
<body>
    <!--
        Pagina statica di atterraggio post-annullamento Stripe Checkout.
        Non esiste nessuna interazione Firebase: Stripe non ha addebitato nulla,
        non è necessaria alcuna verifica dello stato utente.
    -->
    <main aria-labelledby="page-title">
        <div class="cancel-card">

            <!-- aria-hidden="true": icona puramente decorativa,
                 il titolo h1 già esprime il significato della pagina -->
            <div class="icon-container" aria-hidden="true">
                <i class="fa-solid fa-arrow-rotate-left"></i>
            </div>

            <h1 id="page-title">Operazione Interrotta</h1>
            <p>
                La procedura di checkout è stata annullata.
                Nessun addebito è stato effettuato sulla tua carta di credito.
            </p>

            <a href="index.html" class="btn-warning">
                <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                Torna alla Dashboard
            </a>

        </div>
    </main>
</body>
</html>
