<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Completato | InvestPro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK: necesario per verificare lo stato PRO in tempo reale -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --primary: #10b981;
            --primary-hover: #059669;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius-xl: 16px;
            --radius-md: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .success-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 3rem 2rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.6);
            animation: slideUp 0.5s ease-out;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            transition: background 0.3s;
        }
        .icon-container.syncing {
            background: rgba(245, 158, 11, 0.1);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .icon-container i { font-size: 2.5rem; color: var(--primary); transition: color 0.3s; }
        .icon-container.syncing i { color: var(--warning); }

        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem; letter-spacing: -0.02em; }

        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }

        .status-bar {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--warning);
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }
        .status-bar.confirmed {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }
        .status-bar.hidden { display: none; }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--primary);
            color: #000;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .redirect-text {
            display: block;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .redirect-text span { font-weight: 700; color: var(--text-main); }
        .redirect-text.hidden { display: none; }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fa-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-container syncing" id="icon-wrapper">
            <i class="fa-solid fa-rotate fa-spin" id="status-icon"></i>
        </div>
        <h1 id="main-title">Pagamento Ricevuto</h1>
        <p id="main-desc">Sincronizzazione permessi PRO in corso. Non chiudere questa pagina.</p>

        <!-- SECURITY FIX B3 & B4: stato sincronizzazione in tempo reale via Firestore -->
        <div class="status-bar" id="status-bar">
            <i class="fa-solid fa-rotate fa-spin"></i>
            <span id="status-text">Attesa conferma da Stripe...</span>
        </div>

        <button class="btn-primary" id="btn-dashboard" disabled>
            <i class="fa-solid fa-chart-line"></i>
            Vai alla Dashboard
        </button>

        <span class="redirect-text hidden" id="redirect-msg">
            Reindirizzamento automatico tra <span id="countdown">10</span> secondi...
        </span>
    </div>

    <script>
    (function() {
        // Stessa config Firebase dell'app principale
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyDiGDvR2yXm0DE7vlJNGrIPQB0G-ntLHc0",
            authDomain: "analisimmobiliare-3b4a7.firebaseapp.com",
            projectId: "analisimmobiliare-3b4a7",
            storageBucket: "analisimmobiliare-3b4a7.firebasestorage.app",
            messagingSenderId: "29979040948",
            appId: "1:29979040948:web:597ea331e06567d8d50be1"
        };

        // SECURITY FIX B4: verifica reale dello stato PRO prima di mostrare successo.
        // Senza questo controllo, chiunque navighi direttamente a success.html 
        // vede il messaggio di successo senza aver pagato.

        firebase.initializeApp(FIREBASE_CONFIG);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const iconWrapper = document.getElementById('icon-wrapper');
        const statusIcon  = document.getElementById('status-icon');
        const mainTitle   = document.getElementById('main-title');
        const mainDesc    = document.getElementById('main-desc');
        const statusBar   = document.getElementById('status-bar');
        const statusText  = document.getElementById('status-text');
        const btnDashboard = document.getElementById('btn-dashboard');
        const redirectMsg = document.getElementById('redirect-msg');
        const countdown   = document.getElementById('countdown');

        let unsubscribeSnapshot = null;
        let countdownTimer = null;
        let timeoutHandle = null;
        let redirected = false;

        function goToDashboard() {
            if(redirected) return;
            redirected = true;
            if(unsubscribeSnapshot) unsubscribeSnapshot();
            clearInterval(countdownTimer);
            clearTimeout(timeoutHandle);
            window.location.replace('index.html');
        }

        function onProConfirmed() {
            // PRO confermato: aggiorna UI e avvia countdown
            iconWrapper.classList.remove('syncing');
            statusIcon.className = 'fa-solid fa-check';
            mainTitle.textContent = 'Pagamento Confermato ✦';
            mainDesc.textContent = 'Il tuo account PRO è attivo. Accesso illimitato abilitato.';
            statusBar.className = 'status-bar confirmed';
            statusText.textContent = 'Account PRO attivato con successo';
            btnDashboard.disabled = false;
            btnDashboard.addEventListener('click', goToDashboard);
            redirectMsg.classList.remove('hidden');

            let timeLeft = 10;
            countdown.textContent = timeLeft;
            countdownTimer = setInterval(() => {
                timeLeft--;
                countdown.textContent = timeLeft;
                if(timeLeft <= 0) { clearInterval(countdownTimer); goToDashboard(); }
            }, 1000);
        }

        function onTimeout() {
            // SECURITY FIX B3: timeout — possibile ritardo webhook Stripe.
            // Non blocchiamo l'utente, ma informiamo onestamente.
            if(redirected) return;
            if(unsubscribeSnapshot) unsubscribeSnapshot();
            statusBar.className = 'status-bar';
            statusText.textContent = 'Sincronizzazione lenta — riprova tra qualche minuto';
            iconWrapper.classList.remove('syncing');
            statusIcon.className = 'fa-solid fa-triangle-exclamation';
            statusIcon.style.color = 'var(--warning)';
            mainDesc.textContent = 'Il pagamento risulta ricevuto ma i permessi potrebbero impiegare 1-2 minuti. Torna alla dashboard e aggiorna la pagina.';
            btnDashboard.disabled = false;
            btnDashboard.addEventListener('click', goToDashboard);
        }

        // Attendi autenticazione, poi ascolta Firestore
        auth.onAuthStateChanged(async (user) => {
            if(!user) {
                // Utente non loggato: non possiamo verificare, redirect immediato
                statusText.textContent = 'Nessuna sessione attiva — redirect in corso...';
                setTimeout(goToDashboard, 2000);
                return;
            }

            statusText.textContent = `Verifica per ${user.email}...`;

            // SECURITY FIX B3: ascoltare il documento utente in real-time.
            // Il redirect avviene SOLO quando Firestore conferma plan:'pro'
            // o quando i custom claims vengono aggiornati dalla Stripe Extension.
            unsubscribeSnapshot = db.collection('users').doc(user.uid).onSnapshot(async (snap) => {
                if(!snap.exists || redirected) return;
                const data = snap.data();

                // Check 1: campo plan aggiornato dalla Stripe Extension
                if(data.plan === 'pro') { onProConfirmed(); return; }

                // Check 2: verifica custom claim JWT (aggiornamento può arrivare prima del doc)
                try {
                    const tokenResult = await user.getIdTokenResult(true);
                    if(tokenResult.claims.stripeRole === 'pro') { onProConfirmed(); return; }
                } catch(e) {}

                // Check 3: pagamento lifetime
                try {
                    const payments = await db.collection('customers').doc(user.uid)
                        .collection('payments').where('status','==','succeeded').limit(1).get();
                    if(!payments.empty) { onProConfirmed(); return; }
                } catch(e) {}
            });

            // Timeout di sicurezza: 20 secondi
            timeoutHandle = setTimeout(onTimeout, 20000);
        });
    })();
    </script>

</body>
</html>
